<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f8ef7;
    }

    .input-row button {
      padding: 10px 18px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #2f6de0;
    }

    .stats {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 16px;
      text-align: right;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 10px;
      border-radius: 10px;
      transition: background 0.15s;
    }

    li:hover {
      background: #f7fafc;
    }

    li + li {
      border-top: 1px solid #edf2f7;
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #4f8ef7;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-name {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-all;
    }

    .item-name.checked {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }

    .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .clear-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      background: none;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      color: #718096;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      border-color: #fc8181;
      color: #e53e3e;
      background: #fff5f5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." autocomplete="off" />
      <button id="addBtn">추가</button>
    </div>

    <div class="stats" id="stats"></div>

    <ul id="list"></ul>

    <div id="emptyMsg" class="empty">리스트가 비어있습니다.</div>

    <button class="clear-btn" id="clearBtn">완료된 항목 삭제</button>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://gdwpjsgbafkhswtlxtze.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkd3Bqc2diYWZraHN3dGx4dHplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMTYwMjksImV4cCI6MjA5NTg5MjAyOX0.g6Ci5LmV2Mz-4LwE6-h2iROKPo5UXBhIqpD2TsKKeHs';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function load() {
      const { data, error } = await supabase
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });
      if (error) { console.error('불러오기 실패:', error); return []; }
      return data;
    }

    async function render() {
      const items = await load();
      const list = document.getElementById('list');
      const emptyMsg = document.getElementById('emptyMsg');
      const stats = document.getElementById('stats');

      list.innerHTML = '';

      if (items.length === 0) {
        emptyMsg.style.display = 'block';
        stats.textContent = '';
        return;
      }

      emptyMsg.style.display = 'none';

      const checked = items.filter(i => i.done).length;
      stats.textContent = `${checked} / ${items.length} 완료`;

      items.forEach(item => {
        const li = document.createElement('li');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = item.done;
        checkbox.onchange = () => toggleItem(item.id, item.done);

        const span = document.createElement('span');
        span.className = 'item-name' + (item.done ? ' checked' : '');
        span.textContent = item.name;

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.textContent = '×';
        delBtn.title = '삭제';
        delBtn.setAttribute('aria-label', '삭제');
        delBtn.addEventListener('click', () => deleteItem(item.id));

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(delBtn);
        list.appendChild(li);
      });
    }

    async function addItem() {
      const input = document.getElementById('itemInput');
      const name = input.value.trim();
      if (!name) return;

      const { error } = await supabase
        .from('shopping_items')
        .insert({ name, done: false });
      if (error) { console.error('추가 실패:', error); return; }

      input.value = '';
      await render();
      input.focus();
    }

    async function toggleItem(id, currentDone) {
      const { error } = await supabase
        .from('shopping_items')
        .update({ done: !currentDone })
        .eq('id', id);
      if (error) { console.error('수정 실패:', error); return; }
      await render();
    }

    async function deleteItem(id) {
      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .eq('id', id);
      if (error) { console.error('삭제 실패:', error); return; }
      await render();
    }

    async function clearChecked() {
      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .eq('done', true);
      if (error) { console.error('완료 항목 삭제 실패:', error); return; }
      await render();
    }

    document.getElementById('addBtn').addEventListener('click', addItem);
    document.getElementById('clearBtn').addEventListener('click', clearChecked);
    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
